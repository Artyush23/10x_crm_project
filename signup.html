<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a 10X CRM account.">
    <script>
      (() => {
        let theme = "light";

        try {
          theme = localStorage.getItem("crm_theme") === "dark" ? "dark" : "light";
        } catch {
          theme = "light";
        }

        document.documentElement.dataset.theme = theme;
        document.documentElement.style.backgroundColor =
          theme === "dark" ? "#101116" : "#e9e9ed";
      })();
    </script>
    <style>
      html {
        min-height: 100%;
        background: #e9e9ed;
        color-scheme: light;
      }

      body {
        min-height: 100%;
        margin: 0;
        background: inherit;
      }

      html[data-theme="dark"] {
        background: #101116;
        color-scheme: dark;
      }
    </style>
    <title>Sign Up | 10X CRM</title>
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body data-page="signup">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="10X CRM home">
        <img src="assets/logo.svg" alt="" width="32" height="32">
        <span>10X CRM</span>
      </a>
    </header>

    <main class="auth-page" id="main-content">
      <section class="auth-card" aria-labelledby="page-title">
        <div class="auth-card__heading">
          <p class="eyebrow">New workspace</p>
          <h1 id="page-title">Create your account</h1>
        </div>

        <form class="auth-form" id="signup-form" novalidate>
          <div class="form-field">
            <label for="full-name">Full Name</label>
            <input
              id="full-name"
              name="fullName"
              type="text"
              autocomplete="name"
              aria-describedby="full-name-error"
              required
            >
            <p class="form-error" id="full-name-error" aria-live="polite"></p>
          </div>

          <div class="form-field">
            <label for="signup-email">Email</label>
            <input
              id="signup-email"
              name="email"
              type="text"
              autocomplete="email"
              aria-describedby="signup-email-error"
              required
            >
            <p class="form-error" id="signup-email-error" aria-live="polite"></p>
          </div>

          <div class="form-field">
            <label for="company">Company</label>
            <input
              id="company"
              name="company"
              type="text"
              autocomplete="organization"
              placeholder="Company (optional)"
            >
          </div>

          <div class="form-field">
            <label for="signup-password">Password</label>
            <input
              id="signup-password"
              name="password"
              type="password"
              autocomplete="new-password"
              aria-describedby="signup-password-error"
              required
            >
            <p class="form-error" id="signup-password-error" aria-live="polite"></p>
          </div>

          <div class="form-field">
            <label for="confirm-password">Confirm Password</label>
            <input
              id="confirm-password"
              name="confirmPassword"
              type="password"
              autocomplete="new-password"
              aria-describedby="confirm-password-error"
              required
            >
            <p class="form-error" id="confirm-password-error" aria-live="polite"></p>
          </div>

          <button class="auth-form__submit" type="submit">Create Account</button>
        </form>

        <p class="auth-card__footer">
          Already have an account? <a href="index.html">Log in</a>
        </p>
      </section>
    </main>

    <script type="module" src="js/pages/signup.js"></script>
  </body>
</html>
