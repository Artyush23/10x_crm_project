<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to the 10X CRM workspace.">
    <script>
      (() => {
        let theme = "light";

        try {
          theme = localStorage.getItem("crm_theme") === "dark" ? "dark" : "light";
        } catch {
          theme = "light";
        }

        document.documentElement.dataset.theme = theme;
        document.documentElement.style.backgroundColor =
          theme === "dark" ? "#101116" : "#e9e9ed";
      })();
    </script>
    <style>
      html {
        min-height: 100%;
        background: #e9e9ed;
        color-scheme: light;
      }

      body {
        min-height: 100%;
        margin: 0;
        background: inherit;
      }

      html[data-theme="dark"] {
        background: #101116;
        color-scheme: dark;
      }
    </style>
    <title>Log In | 10X CRM</title>
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body data-page="login">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="10X CRM home">
        <img src="assets/logo.svg" alt="" width="32" height="32">
        <span>10X CRM</span>
      </a>
    </header>

    <main class="auth-page" id="main-content">
      <section class="auth-card" aria-labelledby="page-title">
        <div class="auth-card__heading">
          <p class="eyebrow">Account access</p>
          <h1 id="page-title">Welcome back</h1>
        </div>

        <form class="auth-form" id="login-form" novalidate>
          <div class="form-field">
            <label for="login-email">Email</label>
            <input
              id="login-email"
              name="email"
              type="text"
              autocomplete="email"
              aria-describedby="login-email-error"
              required
            >
            <p class="form-error" id="login-email-error" aria-live="polite"></p>
          </div>

          <div class="form-field">
            <label for="login-password">Password</label>
            <input
              id="login-password"
              name="password"
              type="password"
              autocomplete="current-password"
              aria-describedby="login-password-error login-credentials-error"
              required
            >
            <p class="form-error" id="login-password-error" aria-live="polite"></p>
          </div>

          <p
            class="form-error form-error--summary"
            id="login-credentials-error"
            role="alert"
          ></p>

          <button class="auth-form__submit" type="submit">Log In</button>
        </form>

        <p class="auth-card__footer">
          Don't have an account? <a href="signup.html">Sign up</a>
        </p>
      </section>
    </main>

    <script type="module" src="js/pages/login.js"></script>
  </body>
</html>
