<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage clients in 10X CRM.">
    <title>Clients | 10X CRM</title>
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body class="app-layout" data-page="clients">
    <aside class="app-sidebar" data-navigation-root aria-label="Application navigation"></aside>

    <main class="clients-page" id="main-content">
      <header class="clients-page__header">
        <div>
          <p class="eyebrow">Customer relationships</p>
          <h1 id="page-title">Clients</h1>
        </div>
        <button id="add-client-button" type="button">+ Add Client</button>
      </header>

      <section class="clients-panel" aria-labelledby="client-list-title">
        <h2 class="visually-hidden" id="client-list-title">Client list</h2>
        <div class="client-list" id="client-list" aria-live="polite">
          <p class="client-list__message">Loading clients...</p>
        </div>
      </section>
    </main>

    <script type="module" src="js/pages/clients.js"></script>
  </body>
</html>
